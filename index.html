<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шифровальщик текстовых сообщений</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Шифровальщик сообщений</h1>

        <label for="inputText">Исходный текст:</label>
        <textarea id="inputText" placeholder="Введите текст для шифрования или расшифровки..."></textarea>

        <label for="cipherSelect">Алгоритм:</label>
        <select id="cipherSelect">
            <option value="caesar">Шифр Цезаря</option>
            <option value="atbash">Шифр Атбаш</option>
        </select>

        <div id="shiftContainer">
            <label for="shiftInput">Сдвиг:</label>
            <input type="number" id="shiftInput" value="3">
        </div>

        <div class="button-group">
            <button id="encryptBtn">Зашифровать</button>
            <button id="decryptBtn">Расшифровать</button>
            <button id="saveBtn">Сохранить в файл</button>
            <button id="loadBtn">Загрузить из файла</button>
        </div>

        <input type="file" id="fileInput" accept=".txt" style="display: none;">

        <label for="outputArea">Результат:</label>
        <div id="outputArea" class="output"></div>

        <div id="messageBox" class="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
